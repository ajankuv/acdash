# Build Docker image and push to GitHub Container Registry (GHCR).
#
# - Push to `main`  → `ghcr.io/<owner>/<repo>:latest` (+ short SHA tag)
# - Push tag `v*`   → `ghcr.io/<owner>/<repo>:<semver>` and a GitHub Release
#
# Portainer: use image `ghcr.io/<your-github-user>/<repo>:latest` or `:1.2.3`
# First time: repo → Settings → Actions → General → Workflow permissions → Read and write.
# Package may be private: github.com/<user>/<repo>/pkgs/container/<repo> → Package settings → Public.

name: Release & Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image tag (semver without leading v)
        id: sem
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            **Docker image (GHCR — use this in Portainer):**

            ```text
            ghcr.io/${{ github.repository }}:${{ steps.sem.outputs.tag }}
            ```

            Git tag is **`${{ github.ref_name }}`**; the container tag is **`${{ steps.sem.outputs.tag }}`** (no `v` prefix).

            For rolling updates from **`main`**, use **`ghcr.io/${{ github.repository }}:latest`** instead.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

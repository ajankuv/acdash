# Portainer → Stacks → paste as Web editor, or: docker compose up -d

services:
  acdash:
    image: ghcr.io/ajankuv/acdash:latest
    container_name: acdash
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1
      - ENV_FILE_PATH=/app/data/.env
    volumes:
      - acdash_data:/app/data

volumes:
  acdash_data:

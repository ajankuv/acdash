{% extends "base.html" %}
{% block content %}
  <div class="mx-auto max-w-md">
    <h2 class="mb-1 text-lg font-semibold text-zinc-100">Welcome</h2>
    <p class="mb-6 text-sm text-zinc-500">
      Enter your AC Infinity cloud login once. We store it in a local file on this server
      (<code class="rounded bg-zinc-900 px-1 py-0.5 text-xs text-zinc-400">.env</code>).
      Delete that file to see this screen again.
    </p>

    {% if error %}
      <div class="mb-4 rounded-lg border border-red-900/80 bg-red-950/50 px-4 py-3 text-sm text-red-200">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" action="/setup" class="space-y-4 rounded-2xl border border-zinc-800 bg-zinc-900/60 p-6 shadow-xl shadow-black/40">
      <div>
        <label for="email" class="mb-1 block text-xs font-medium uppercase tracking-wider text-zinc-500">Email</label>
        <input
          type="email"
          name="email"
          id="email"
          required
          autocomplete="username"
          class="w-full rounded-lg border border-zinc-700 bg-black/50 px-3 py-2 text-sm text-zinc-100 placeholder-zinc-600 outline-none ring-emerald-500/0 transition focus:border-emerald-600/50 focus:ring-2 focus:ring-emerald-500/30"
          placeholder="you@example.com"
        />
      </div>
      <div>
        <label for="password" class="mb-1 block text-xs font-medium uppercase tracking-wider text-zinc-500">Password</label>
        <input
          type="password"
          name="password"
          id="password"
          required
          autocomplete="current-password"
          class="w-full rounded-lg border border-zinc-700 bg-black/50 px-3 py-2 text-sm text-zinc-100 placeholder-zinc-600 outline-none ring-emerald-500/0 transition focus:border-emerald-600/50 focus:ring-2 focus:ring-emerald-500/30"
          placeholder="••••••••"
        />
      </div>
      <button
        type="submit"
        class="w-full rounded-lg bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-emerald-900/30 transition hover:bg-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-400/50"
      >
        Save and open dashboard
      </button>
    </form>
  </div>
{% endblock %}
